name: Java CI with Gradle and Deploy to OCI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Node.js 설정 및 프론트엔드 빌드
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install & Build Frontend
      run: |
        cd infoshare-page
        npm install --legacy-peer-deps
        npm run build

    # 2. 프론트엔드 빌드 결과물을 백엔드로 복사 (통합)
    - name: Copy Frontend build to Backend
      run: |
        mkdir -p infoshare-back/src/main/webapp
        cp -r infoshare-page/dist/* infoshare-back/src/main/webapp/

    # 3. Java 설정 및 백엔드 빌드
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x ./infoshare-back/gradlew

    - name: Build with Gradle
      run: ./infoshare-back/gradlew clean build -x test -p ./infoshare-back

    # 4. 생성된 통합 WAR 파일 서버 전송
    - name: Deliver WAR file via SCP
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.REMOTE_IP }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_KEY }}
        source: "infoshare-back/build/libs/*.war"
        target: "/home/ubuntu/deploy"
        strip_components: 3

# 5. 서버 배포 및 권한 강제 설정
    - name: Deploy to Tomcat
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.REMOTE_IP }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          # 1. 기존 배포물 완전 삭제
          sudo rm -rf /var/lib/tomcat9/webapps/ROOT
          sudo rm -f /var/lib/tomcat9/webapps/ROOT.war
          
          # 2. 최신 WAR 파일 복사 (이름을 ROOT.war로 고정)
          WAR_FILE=$(ls -t /home/ubuntu/deploy/*.war | grep -v "plain" | head -n 1)
          sudo cp "$WAR_FILE" /var/lib/tomcat9/webapps/ROOT.war
          
          # 3. 톰캣이 파일을 잘 풀 수 있도록 권한 부여
          sudo chown tomcat:tomcat /var/lib/tomcat9/webapps/ROOT.war
          sudo chmod 644 /var/lib/tomcat9/webapps/ROOT.war
          
          # 4. 톰캣 재시작
          sudo systemctl restart tomcat9
