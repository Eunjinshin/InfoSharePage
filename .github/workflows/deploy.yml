name: Java CI with Gradle and Deploy to OCI

on:
  push:
    branches: [ "main" ] # 브랜치명이 master라면 master로 수정하세요

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: ./infoshare-back # 백엔드 폴더 이름 확인

    - name: Build with Gradle
      run: ./gradlew clean build -x test # 테스트는 일단 건너뛰고 빌드
      working-directory: ./infoshare-back

    - name: Deliver WAR file via SCP
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.REMOTE_IP }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_KEY }}
        source: "infoshare-back/build/libs/*.war"
        target: "/home/ubuntu/deploy"
        strip_components: 3

    - name: Deploy to Tomcat
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.REMOTE_IP }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          # 서버 내 배포 폴더 생성 및 권한 부여
          mkdir -p /home/ubuntu/deploy
          sudo rm -rf /var/lib/tomcat9/webapps/ROOT
          sudo rm -f /var/lib/tomcat9/webapps/ROOT.war
          sudo cp /home/ubuntu/deploy/*.war /var/lib/tomcat9/webapps/ROOT.war
          sudo systemctl restart tomcat9
