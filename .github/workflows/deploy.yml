name: Java CI with Gradle and Deploy to OCI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Node.js 설정 및 프론트엔드 빌드
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install & Build Frontend
      run: |
        cd infoshare-page
        npm install --legacy-peer-deps
        npm run build

    # 2. 프론트엔드 빌드 결과물을 백엔드로 복사 (통합)
    - name: Copy Frontend build to Backend
      run: |
        mkdir -p infoshare-back/src/main/webapp
        cp -r infoshare-page/dist/* infoshare-back/src/main/webapp/

# 3. Java 설정 및 백엔드 빌드 (bootWar 명시)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x ./infoshare-back/gradlew

    - name: Build with Gradle
      # -x test로 테스트를 건너뛰고, bootWar로 전용 파일을 만듭니다.
      run: ./infoshare-back/gradlew clean bootWar -x test -p ./infoshare-back
      
    # 4. 생성된 통합 WAR 파일 서버 전송
    - name: Deliver WAR file via SCP
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.REMOTE_IP }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_KEY }}
        source: "infoshare-back/build/libs/*.war"
        target: "/home/ubuntu/deploy"
        strip_components: 3

# 5. 서버 배포 및 보안 설정 주입
    - name: Deploy to Tomcat 10
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.REMOTE_IP }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          # 1. 보안 설정 폴더 생성 및 설정 파일 쓰기 (GitHub Secrets 활용)
          sudo mkdir -p /opt/tomcat10/conf/secrets
          sudo chown ubuntu:ubuntu /opt/tomcat10/conf/secrets
          
          cat <<EOF > /opt/tomcat10/conf/secrets/application-secret.yml
          spring:
            security:
              oauth2:
                client:
                  registration:
                    google:
                      client-id: "${{ secrets.GOOGLE_CLIENT_ID }}"
                      client-secret: "${{ secrets.GOOGLE_CLIENT_SECRET }}"
          EOF
          
          # 권한 제한 (나만 읽을 수 있게)
          chmod 600 /opt/tomcat10/conf/secrets/application-secret.yml

          # 2. 기존 배포물 교체
          sudo rm -rf /opt/tomcat10/webapps/ROOT
          sudo rm -f /opt/tomcat10/webapps/ROOT.war
          
          WAR_FILE=$(ls -t /home/ubuntu/deploy/*.war | grep -v "plain" | head -n 1)
          sudo cp "$WAR_FILE" /opt/tomcat10/webapps/ROOT.war
          
          # 3. 톰캣 10 재시작
          sudo systemctl restart tomcat10
