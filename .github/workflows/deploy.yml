name: Java CI with Gradle and Deploy to OCI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 # 최신 버전으로 업데이트

    - name: Set up JDK 17
      uses: actions/setup-java@v4 # 최신 버전으로 업데이트
      with:
        java-version: '17'
        distribution: 'temurin'

    # 1. gradlew 파일이 있는지 확인하고 권한 부여
    - name: Grant execute permission for gradlew
      run: |
        cd infoshare-back
        chmod +x gradlew
      shell: bash

    # 2. 빌드 실행 (테스트 제외)
    - name: Build with Gradle
      run: |
        cd infoshare-back
        ./gradlew clean build -x test
      shell: bash

    # 3. 파일 전송 (경로를 더 명확하게 지정)
    - name: Deliver WAR file via SCP
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.REMOTE_IP }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_KEY }}
        source: "infoshare-back/build/libs/*.war"
        target: "/home/ubuntu/deploy"
        strip_components: 3

# 4. 서버 배포 실행 (수정 버전)
    - name: Deploy to Tomcat
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.REMOTE_IP }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          mkdir -p /home/ubuntu/deploy
          
          # 1. 기존 ROOT 삭제
          sudo rm -rf /var/lib/tomcat9/webapps/ROOT
          sudo rm -f /var/lib/tomcat9/webapps/ROOT.war
          
          # 2. plain이 붙지 않은 순수한 .war 파일 하나만 찾아서 ROOT.war로 복사
          # (파일이 여러 개일 때 생기는 오류를 방지하기 위해 가장 최신 파일 하나만 타격)
          WAR_FILE=$(ls -t /home/ubuntu/deploy/*.war | grep -v "plain" | head -n 1)
          
          if [ -n "$WAR_FILE" ]; then
            echo "Deploying: $WAR_FILE"
            sudo cp "$WAR_FILE" /var/lib/tomcat9/webapps/ROOT.war
            sudo systemctl restart tomcat9
            echo "Deployment successful!"
          else
            echo "Error: Executable WAR file not found!"
            exit 1
          fi
