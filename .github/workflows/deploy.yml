name: Java CI with Gradle and Deploy to OCI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Node.js 설정 및 프론트엔드 빌드
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install & Build Frontend
      run: |
        cd infoshare-page
        npm install --legacy-peer-deps
        npm run build

    # 2. 프론트엔드 빌드 결과물을 백엔드로 복사 (통합)
    - name: Copy Frontend build to Backend
      run: |
        mkdir -p infoshare-back/src/main/resources/static
        cp -r infoshare-page/dist/* infoshare-back/src/main/resources/static/

    # 3. Java 설정 및 백엔드 빌드
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x ./infoshare-back/gradlew

    - name: Build with Gradle
      run: ./infoshare-back/gradlew clean build -x test -p ./infoshare-back

    # 4. 생성된 통합 WAR 파일 서버 전송
    - name: Deliver WAR file via SCP
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.REMOTE_IP }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_KEY }}
        source: "infoshare-back/build/libs/*.war"
        target: "/home/ubuntu/deploy"
        strip_components: 3

    # 5. 서버 배포 및 톰캣 재시작
    - name: Deploy to Tomcat
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.REMOTE_IP }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          mkdir -p /home/ubuntu/deploy
          sudo rm -rf /var/lib/tomcat9/webapps/ROOT
          sudo rm -f /var/lib/tomcat9/webapps/ROOT.war
          
          # plain이 붙지 않은 실행 가능한 war 선택
          WAR_FILE=$(ls -t /home/ubuntu/deploy/*.war | grep -v "plain" | head -n 1)
          
          if [ -n "$WAR_FILE" ]; then
            sudo cp "$WAR_FILE" /var/lib/tomcat9/webapps/ROOT.war
            sudo systemctl restart tomcat9
            echo "Integrated Deployment Successful!"
          else
            echo "WAR file not found!"
            exit 1
          fi
