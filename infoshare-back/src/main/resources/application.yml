spring:
  datasource:
    url: jdbc:mysql://localhost:3306/infoshare?serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: "0000"
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  # 아래쪽에 있던 spring 항목들을 위쪽 spring 블록 안으로 들여쓰기해서 합칩니다.
  config:
    import: "optional:classpath:application-secret.yml"
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "mock-client-id"
            client-secret: "mock-client-secret"
            scope: "profile,email"

# spring과 상관없는 설정들은 따로 둡니다.
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  ...
