spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/infoshare?serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: "0000"
  sql:
    init:
      mode: always
      encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  config:
    import: "optional:classpath:application-secret.yml"
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: "profile,email"

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.infoshare.domain
  configuration:
    map-underscore-to-camel-case: true

file:
  upload-dir: /home/ubuntu/infoshare_uploads/

jwt:
  secret: infoshare-key-for-jwt-token-authentication-key-min-256-bits-super-long
