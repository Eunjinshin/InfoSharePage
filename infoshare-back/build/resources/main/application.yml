spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/infoshare?serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: "0000"
  sql:
    init:
      mode: always # 앱 실행 시 schema.sql 파일 실행 (나중엔 never 혹은 지우기) 
      encoding: UTF-8
  output:
    ansi:
      enabled: ALWAYS
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.infoshare.domain
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

file:
  upload-dir: C:/infoshare_uploads/
